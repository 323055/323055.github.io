<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>かんたんカメラ</title>
  <style>
    body {
      margin: 0;
      font-family: sans-serif;
      background: #f7f7f7;
      color: #222;
      text-align: center;
    }

    .container {
      max-width: 420px;
      margin: 0 auto;
      padding: 16px;
    }

    h1 {
      font-size: 24px;
      margin-bottom: 8px;
    }

    p {
      font-size: 14px;
      margin-bottom: 16px;
    }

    .camera-box {
      width: 100%;
      aspect-ratio: 3 / 4;
      background: #000;
      border-radius: 16px;
      overflow: hidden;
      margin-bottom: 16px;
      border: 10px solid #ff4da6;
      box-sizing: border-box;
    }

    video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transform: scaleX(-1);
    }

    canvas {
      display: none;
    }

    .editor-box {
      margin-top: 16px;
      padding: 14px;
      background: #fff;
      border-radius: 16px;
      border: 2px solid #ffd1e8;
      display: none;
      text-align: left;
    }

    .editor-box h2 {
      margin-top: 0;
      font-size: 18px;
      color: #ff4da6;
      text-align: center;
    }

    .editor-box label {
      display: block;
      font-size: 14px;
      font-weight: bold;
      margin-top: 12px;
      margin-bottom: 6px;
    }

    .editor-box select,
    .editor-box input[type="range"] {
      width: 100%;
    }

    .editor-box select {
      font-size: 16px;
      padding: 10px 12px;
      border-radius: 12px;
      border: 2px solid #ff4da6;
      background: #fff;
    }

    .editor-box input[type="range"] {
      accent-color: #ff4da6;
    }

    .buttons {
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
      margin-top: 14px;
    }

    button, a {
      border: none;
      background: #ff4da6;
      color: white;
      padding: 14px 18px;
      border-radius: 999px;
      font-size: 16px;
      text-decoration: none;
      cursor: pointer;
      min-width: 120px;
      -webkit-appearance: none;
      appearance: none;
      touch-action: manipulation;
    }

    .sub-button {
      background: #ff85bf;
    }

    #saveBtn {
      display: none;
    }

    #result {
      margin-top: 20px;
    }

    #result img {
      width: 100%;
      border-radius: 16px;
      display: block;
      border: 10px solid #ff4da6;
      box-sizing: border-box;
    }

    .note {
      font-size: 12px;
      color: #666;
      margin-top: 10px;
    }

    .value-text {
      color: #ff4da6;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>かんたんカメラ</h1>
    <p>撮影したあとに編集して、編集後の写真を保存できます。</p>

    <div class="camera-box">
      <video id="video" autoplay playsinline muted></video>
    </div>

    <div class="buttons">
      <button id="startBtn" type="button">カメラ開始</button>
      <button id="shotBtn" type="button">撮影</button>
      <a id="saveBtn" href="#" download="edited-heisei-purikura.png">保存</a>
    </div>

    <canvas id="canvas"></canvas>

    <div id="result"></div>

    <div id="editorBox" class="editor-box">
      <h2>編集</h2>

      <label for="editMode">フィルター</label>
      <select id="editMode">
        <option value="normal">ノーマル</option>
        <option value="pink">ピンク</option>
      </select>

      <label for="brightnessRange">
        明るさ: <span id="brightnessValue" class="value-text">100</span>
      </label>
      <input type="range" id="brightnessRange" min="80" max="130" value="100">

      <div class="buttons">
        <button id="applyEditBtn" type="button" class="sub-button">編集を反映</button>
      </div>
    </div>

    <div class="note">※ まず撮影してから編集してください。</div>
  </div>

  <script>
    const video = document.getElementById("video");
    const canvas = document.getElementById("canvas");
    const startBtn = document.getElementById("startBtn");
    const shotBtn = document.getElementById("shotBtn");
    const saveBtn = document.getElementById("saveBtn");
    const result = document.getElementById("result");

    const editorBox = document.getElementById("editorBox");
    const editMode = document.getElementById("editMode");
    const brightnessRange = document.getElementById("brightnessRange");
    const brightnessValue = document.getElementById("brightnessValue");
    const applyEditBtn = document.getElementById("applyEditBtn");

    let stream = null;
    let originalPhotoData = null;
    let currentEditedData = null;

    brightnessRange.addEventListener("input", function () {
      brightnessValue.textContent = brightnessRange.value;
    });

    async function waitForVideoReady() {
      if (video.readyState >= 2 && video.videoWidth > 0) return;

      await new Promise((resolve) => {
        const check = () => {
          if (video.videoWidth > 0 && video.videoHeight > 0) {
            video.removeEventListener("loadedmetadata", check);
            video.removeEventListener("canplay", check);
            resolve();
          }
        };
        video.addEventListener("loadedmetadata", check);
        video.addEventListener("canplay", check);
      });
    }

    function showImage(dataUrl) {
      result.innerHTML = '<img src="' + dataUrl + '" alt="写真">';
    }

    function drawDecorations(ctx, width, height) {
      ctx.strokeStyle = "#ff4da6";
      ctx.lineWidth = Math.max(12, width * 0.02);
      ctx.strokeRect(0, 0, width, height);

      ctx.fillStyle = "#ff4da6";
      ctx.font = "bold " + Math.max(24, width * 0.055) + "px sans-serif";
      ctx.textAlign = "center";
      ctx.textBaseline = "top";
      ctx.fillText("HEISEI PURIKURA", width / 2, Math.max(12, height * 0.03));
    }

    function renderEditedFromOriginal() {
      if (!originalPhotoData) return;

      const img = new Image();
      img.onload = function () {
        const width = img.width;
        const height = img.height;

        canvas.width = width;
        canvas.height = height;

        const ctx = canvas.getContext("2d");
        ctx.clearRect(0, 0, width, height);

        let filterText = "brightness(" + (Number(brightnessRange.value) / 100) + ")";
        if (editMode.value === "pink") {
          filterText += " saturate(1.28) contrast(1.08) hue-rotate(-14deg)";
        }

        ctx.filter = filterText;
        ctx.drawImage(img, 0, 0, width, height);
        ctx.filter = "none";

        drawDecorations(ctx, width, height);

        currentEditedData = canvas.toDataURL("image/png");
        showImage(currentEditedData);
        saveBtn.href = currentEditedData;
        saveBtn.style.display = "inline-block";
      };
      img.src = originalPhotoData;
    }

    startBtn.addEventListener("click", async function () {
      try {
        stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: "user" },
          audio: false
        });

        video.srcObject = stream;
        await video.play();
        await waitForVideoReady();

        alert("カメラを開始しました");
      } catch (error) {
        alert("カメラを起動できませんでした");
      }
    });

    shotBtn.addEventListener("click", async function () {
      try {
        if (!stream) {
          alert("先にカメラ開始を押してください");
          return;
        }

        await waitForVideoReady();

        const width = video.videoWidth;
        const height = video.videoHeight;

        if (!width || !height) {
          alert("映像の準備がまだできていません");
          return;
        }

        canvas.width = width;
        canvas.height = height;

        const ctx = canvas.getContext("2d");
        ctx.clearRect(0, 0, width, height);

        ctx.save();
        ctx.translate(width, 0);
        ctx.scale(-1, 1);
        ctx.drawImage(video, 0, 0, width, height);
        ctx.restore();

        originalPhotoData = canvas.toDataURL("image/png");

        const previewImg = new Image();
        previewImg.onload = function () {
          canvas.width = previewImg.width;
          canvas.height = previewImg.height;

          const previewCtx = canvas.getContext("2d");
          previewCtx.clearRect(0, 0, canvas.width, canvas.height);
          previewCtx.drawImage(previewImg, 0, 0);
          drawDecorations(previewCtx, canvas.width, canvas.height);

          currentEditedData = canvas.toDataURL("image/png");
          showImage(currentEditedData);
          saveBtn.href = currentEditedData;
          saveBtn.style.display = "inline-block";
          editorBox.style.display = "block";
          editMode.value = "normal";
          brightnessRange.value = "100";
          brightnessValue.textContent = "100";
        };
        previewImg.src = originalPhotoData;
      } catch (error) {
        alert("撮影に失敗しました");
      }
    });

    applyEditBtn.addEventListener("click", function () {
      if (!originalPhotoData) {
        alert("先に写真を撮影してください");
        return;
      }
      renderEditedFromOriginal();
    });
  </script>
</body>
</html>
