<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>かんたんカメラ 超安全版</title>
  <style>
    body {
      margin: 0;
      font-family: sans-serif;
      background: #f7f7f7;
      color: #222;
      text-align: center;
    }

    .container {
      max-width: 420px;
      margin: 0 auto;
      padding: 16px;
    }

    h1 {
      font-size: 24px;
      margin-bottom: 8px;
    }

    p {
      font-size: 14px;
      margin-bottom: 16px;
    }

    .camera-box {
      width: 100%;
      aspect-ratio: 3 / 4;
      background: #000;
      border-radius: 16px;
      overflow: hidden;
      margin-bottom: 16px;
      border: 10px solid #ff4da6;
      box-sizing: border-box;
    }

    video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transform: scaleX(-1);
    }

    canvas {
      display: none;
    }

    .buttons {
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
      margin-top: 14px;
    }

    button, a {
      border: none;
      background: #ff4da6;
      color: white;
      padding: 14px 18px;
      border-radius: 999px;
      font-size: 16px;
      text-decoration: none;
      cursor: pointer;
      min-width: 120px;
      -webkit-appearance: none;
      appearance: none;
      touch-action: manipulation;
    }

    #saveBtn {
      display: none;
    }

    #result {
      margin-top: 20px;
    }

    #result img {
      width: 100%;
      border-radius: 16px;
      display: block;
      border: 10px solid #ff4da6;
      box-sizing: border-box;
    }

    .note {
      font-size: 12px;
      color: #666;
      margin-top: 10px;
      white-space: pre-line;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>かんたんカメラ 超安全版</h1>
    <p>まずは撮影できるかだけ確認する版です。</p>

    <div class="camera-box">
      <video id="video" autoplay playsinline muted></video>
    </div>

    <div class="buttons">
      <button id="startBtn" type="button">カメラ開始</button>
      <button id="shotBtn" type="button">撮影</button>
      <a id="saveBtn" href="#" download="camera-photo.jpg">保存</a>
    </div>

    anvas id="canvas"></canvas>

    <div id="result"></div>
    <div id="note" class="note">準備中</div>
  </div>

  <script>
    const video = document.getElementById("video");
    const canvas = document.getElementById("canvas");
    const startBtn = document.getElementById("startBtn");
    const shotBtn = document.getElementById("shotBtn");
    const saveBtn = document.getElementById("saveBtn");
    const result = document.getElementById("result");
    const note = document.getElementById("note");

    let stream = null;

    function setNote(text) {
      note.textContent = text;
    }

    async function waitForVideoReady() {
      if (video.readyState >= 2 && video.videoWidth > 0) return;

      await new Promise((resolve, reject) => {
        const timeoutId = setTimeout(() => {
          cleanup();
          reject(new Error("video-timeout"));
        }, 5000);

        function done() {
          if (video.videoWidth > 0 && video.videoHeight > 0) {
            cleanup();
            resolve();
          }
        }

        function cleanup() {
          clearTimeout(timeoutId);
          video.removeEventListener("loadedmetadata", done);
          video.removeEventListener("canplay", done);
          video.removeEventListener("playing", done);
        }

        video.addEventListener("loadedmetadata", done);
        video.addEventListener("canplay", done);
        video.addEventListener("playing", done);
      });
    }

    startBtn.addEventListener("click", async function () {
      try {
        setNote("カメラの許可を確認しています…");

        stream = await navigator.mediaDevices.getUserMedia({
          video: true,
          audio: false
        });

        video.srcObject = stream;
        await video.play();
        await waitForVideoReady();

        setNote("カメラ開始成功。映像が見えたら撮影してください。");
      } catch (error) {
        setNote("カメラ開始失敗: " + error.name + " / " + error.message);
        alert("カメラを起動できませんでした");
      }
    });

    shotBtn.addEventListener("click", async function () {
      try {
        if (!stream) {
          setNote("まだカメラ開始していません。");
          alert("先にカメラ開始を押してください");
          return;
        }

        await waitForVideoReady();

        const sourceWidth = video.videoWidth;
        const sourceHeight = video.videoHeight;

        if (!sourceWidth || !sourceHeight) {
          setNote("videoWidth か videoHeight が 0 です。");
          alert("映像の準備がまだできていません");
          return;
        }

        const width = 320;
        const height = Math.round(sourceHeight / (sourceWidth / width));

        canvas.width = width;
        canvas.height = height;

        const ctx = canvas.getContext("2d");
        ctx.clearRect(0, 0, width, height);

        ctx.save();
        ctx.translate(width, 0);
        ctx.scale(-1, 1);
        ctx.drawImage(video, 0, 0, width, height);
        ctx.restore();

        const imageData = canvas.toDataURL("image/jpeg", 0.9);

        result.innerHTML = '<img src="' + imageData + '" alt="撮影した写真">';
        saveBtn.href = imageData;
        saveBtn.style.display = "inline-block";

        setNote("撮影成功。保存ボタンも使えます。");
      } catch (error) {
        setNote("撮影失敗: " + error.name + " / " + error.message);
        alert("撮影に失敗しました");
      }
    });
  </script>
</body>
</html>
