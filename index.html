<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>heisei-galakei-enhanced</title>
  <link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700&display=swap" rel="stylesheet">
  <style>
    :root {
      --pink: #ff4fa3;
      --deep-pink: #ff2c88;
      --aqua: #74dcff;
      --mint: #b8ffd8;
      --yellow: #fff06d;
      --lavender: #a98fff;
      --text: #4b2750;
      --sub: #8f6d95;
      --shell: rgba(255,255,255,.82);
      --panel: rgba(255,247,252,.84);
      --border: rgba(255,79,163,.25);
      --shadow: 0 16px 40px rgba(255,79,163,.18);
      --radius: 30px;
      --font: 'Satoshi', system-ui, sans-serif;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { -webkit-text-size-adjust: none; text-size-adjust: none; }
    body {
      min-height: 100dvh;
      font-family: var(--font);
      color: var(--text);
      background:
        radial-gradient(circle at 10% 15%, rgba(255,255,255,.95) 0 3px, transparent 4px),
        radial-gradient(circle at 82% 25%, rgba(255,255,255,.85) 0 4px, transparent 5px),
        radial-gradient(circle at 60% 70%, rgba(255,255,255,.75) 0 2px, transparent 3px),
        linear-gradient(140deg, #ffd8ef 0%, #eef8ff 45%, #fff3bd 100%);
      background-size: 180px 180px, 230px 230px, 190px 190px, cover;
      line-height: 1.6;
      padding: 18px;
    }
    button, input { font: inherit; }
    button { background: none; border: 0; color: inherit; cursor: pointer; }
    .shell {
      max-width: 1180px;
      margin: 0 auto;
      display: grid;
      gap: 18px;
    }
    .hero {
      position: relative;
      padding: 26px;
      border-radius: 34px;
      background: linear-gradient(135deg, rgba(255,255,255,.94), rgba(255,245,251,.92));
      border: 3px solid rgba(255,255,255,.8);
      box-shadow: var(--shadow);
      overflow: hidden;
    }
    .hero::before {
      content: '' !important;
      position: absolute;
      inset: 10px;
      border: 2px dashed rgba(255,79,163,.18);
      border-radius: 28px;
      pointer-events: none;
    }
    .hero-top {
      display: flex;
      justify-content: space-between;
      gap: 18px;
      align-items: flex-start;
    }
    .sticker-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 12px;
    }
    .sticker {
      min-height: 38px;
      padding: 0 14px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: #fff;
      border: 2px solid rgba(255,255,255,.8);
      border-radius: 999px;
      font-weight: 700;
      box-shadow: 0 8px 18px rgba(169,143,255,.14);
    }
    .sticker:nth-child(1) { color: #ff4fa3; }
    .sticker:nth-child(2) { color: #5d86ff; }
    .sticker:nth-child(3) { color: #8d5bff; }
    h1 {
      font-size: clamp(2.2rem, 1.2rem + 3.8vw, 4.6rem);
      line-height: .98;
      letter-spacing: .02em;
      color: var(--deep-pink);
      -webkit-text-stroke: 1px rgba(255,255,255,.95);
      text-shadow: 2px 2px 0 #fff, 5px 5px 0 rgba(130,216,255,.35);
      margin-bottom: 10px;
    }
    .lead {
      max-width: 60ch;
    }
    .hero-side {
      display: grid;
      gap: 10px;
      justify-items: end;
    }
    .theme-btn, .mini-chip {
      min-height: 44px;
      padding: 0 16px;
      border-radius: 999px;
      background: #fff;
      border: 2px solid #ffd2ec;
      font-weight: 700;
    }
    .mini-chip {
      font-size: .88rem;
    }
    .layout {
      display: grid;
      gap: 18px;
    }
    .card {
      background: var(--panel);
      backdrop-filter: blur(14px);
      border-radius: 30px;
      border: 3px solid rgba(255,255,255,.78);
      box-shadow: var(--shadow);
      padding: 18px;
    }
    .card h2 {
      font-size: 1.15rem;
      margin-bottom: 10px;
    }
    .sub, .meta, .note {
      color: var(--sub);
      font-size: .93rem;
    }
    .picker, .toolbar, .option-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }
    .main-btn, .sub-btn, .select-btn {
      min-height: 46px;
      padding: 0 16px;
      border-radius: 999px;
      font-weight: 700;
      transition: transform .15s ease;
    }
    .main-btn:hover, .sub-btn:hover, .select-btn:hover {
      transform: translateY(-1px);
    }
    .main-btn {
      background: linear-gradient(135deg, #ff4fa3, #ff82bd);
      color: #fff;
    }
    .sub-btn {
      background: #fff;
      border: 2px solid #ffd2ec;
    }
    .select-btn {
      background: #fffbe1;
      border: 2px solid #ffef95;
    }
    .active {
      background: linear-gradient(135deg, #ffd7ec, #fff1ba);
    }
    input[type="file"] {
      display: none;
    }
    .slider-grid {
      display: grid;
      gap: 12px;
    }
    .slider-box {
      display: grid;
      gap: 6px;
    }
    .slider-line {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      font-size: .94rem;
    }
    input[type="range"] {
      width: 100%;
      accent-color: var(--pink);
    }

    .phone {
      position: relative;
      background: linear-gradient(180deg, #ffcce7, #ffdff0 32%, #fff3f9 100%);
      border-radius: 42px;
      padding: 18px;
      border: 4px solid rgba(255,255,255,.88);
      box-shadow: 0 18px 50px rgba(255,79,163,.24), inset 0 0 0 2px rgba(255,79,163,.14);
    }
    .phone::before {
      content: '' !important;
      position: absolute;
      top: 12px;
      right: 24px;
      width: 14px;
      height: 14px;
      background: radial-gradient(circle at 35% 35%, #fff, #82d8ff 55%, #4e9cff);
      border-radius: 999px;
      box-shadow: 0 0 0 4px rgba(255,255,255,.6);
    }
    .antenna {
      position: absolute;
      top: -8px;
      right: 50px;
      width: 8px;
      height: 52px;
      border-radius: 999px;
      background: linear-gradient(180deg, #fff, #d8c6ff 50%, #9a74ff 100%);
      transform: rotate(10deg);
      box-shadow: 0 4px 12px rgba(154,116,255,.22);
    }
    .screen-wrap {
      background: linear-gradient(180deg, #fffdff, #fff8fc);
      border-radius: 26px;
      border: 4px solid #fff;
      padding: 16px;
      box-shadow: inset 0 0 0 3px rgba(255,79,163,.12);
    }
    .statusbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
      font-size: .8rem;
      color: #9b58a1;
      font-weight: 700;
    }
    .signal {
      display: flex;
      gap: 3px;
      align-items: flex-end;
    }
    .signal span {
      width: 4px;
      background: #ff4fa3;
      border-radius: 4px 4px 0 0;
    }
    .signal span:nth-child(1) { height: 8px; }
    .signal span:nth-child(2) { height: 12px; }
    .signal span:nth-child(3) { height: 16px; }
    .signal span:nth-child(4) { height: 20px; }
    .lcd {
      position: relative;
      min-height: 380px;
      display: grid;
      place-items: center;
      overflow: hidden;
      border-radius: 22px;
      background:
        linear-gradient(180deg, rgba(255,255,255,.22), rgba(255,255,255,.06)),
        linear-gradient(140deg, #ffd7ec, #dbf2ff 58%, #fff1b2);
      border: 4px solid rgba(255,255,255,.86);
    }
    .lcd::before {
      content: '待受け / プリクラ編集' !important;
      position: absolute;
      top: 12px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(255,255,255,.82);
      color: #ff2c88;
      font-size: .78rem;
      font-weight: 800;
      letter-spacing: .08em;
      padding: 6px 12px;
      border-radius: 999px;
    }
    canvas {
      display: block;
      max-width: 100%;
      height: auto;
      border-radius: 18px;
      background: #111;
    }
    .empty {
      text-align: center;
      color: #fff;
      padding: 76px 16px 18px;
      text-shadow: 0 2px 10px rgba(0,0,0,.15);
    }
    .empty strong {
      display: block;
      font-size: 1.24rem;
      margin-bottom: 6px;
    }
    .keypad {
      margin-top: 16px;
      display: grid;
      gap: 12px;
    }
    .nav-ring {
      width: 126px;
      height: 126px;
      margin: 0 auto;
      border-radius: 999px;
      background: radial-gradient(circle at 35% 30%, #fff, #ffe4f3 55%, #ffc6e5 100%);
      border: 4px solid #fff;
      position: relative;
      box-shadow: inset 0 0 0 2px rgba(255,79,163,.14);
    }
    .nav-ring::before, .nav-ring::after {
      content: '' !important;
      position: absolute;
      inset: 28px;
      border-radius: 999px;
      border: 3px solid rgba(255,79,163,.18);
    }
    .nav-ok {
      position: absolute;
      inset: 42px;
      border-radius: 999px;
      display: grid;
      place-items: center;
      font-weight: 900;
      background: linear-gradient(135deg, #ff4fa3, #ff83bd);
      color: #fff;
    }
    .key-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }
    .key {
      min-height: 54px;
      border-radius: 18px;
      background: linear-gradient(180deg, #fff, #ffeef7);
      border: 3px solid #fff;
      font-weight: 800;
      color: #b04e89;
      box-shadow: inset 0 0 0 2px rgba(255,79,163,.08);
    }
    .meta {
      color: var(--sub);
      font-size: .93rem;
      margin-top: 12px;
    }
    .note {
      font-size: .88rem;
      color: var(--sub);
    }
    @media (min-width: 980px) {
      .layout {
        grid-template-columns: 370px 1fr;
        align-items: start;
      }
    }
    @media (prefers-reduced-motion: reduce) {
      * {
        transition: none !important;
      }
    }
  </style>
</head>

    <header class="hero">
      <div class="hero-top">
        <div>
          <div class="sticker-row">
            <span class="sticker">♡ 平成レトロ</span>
            <span class="sticker">✦ ガラケー風</span>
            <span class="sticker">★ プリクラ風</span>
          </div>
