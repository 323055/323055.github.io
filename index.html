<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>平成プリクラ風カメラ</title>
  <style>
    body {
      margin: 0;
      font-family: sans-serif;
      background: linear-gradient(180deg, #ffe7f3, #fff7fb);
      color: #333;
      text-align: center;
    }

    .container {
      max-width: 430px;
      margin: 0 auto;
      padding: 16px;
    }

    h1 {
      font-size: 24px;
      color: #ff4da6;
      margin-bottom: 8px;
    }

    p {
      font-size: 14px;
      margin-bottom: 16px;
    }

    .camera-wrap {
      position: relative;
      width: 100%;
      aspect-ratio: 3 / 4;
      background: #000;
      overflow: hidden;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(255, 105, 180, 0.2);
    }

    video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transform: scaleX(-1);
    }

    .frame {
      position: absolute;
      inset: 0;
      pointer-events: none;
      border: 16px solid #ff6fb5;
      border-radius: 20px;
      box-sizing: border-box;
    }

    .title-badge {
      position: absolute;
      top: 12px;
      left: 50%;
      transform: translateX(-50%);
      color: #ff4da6;
      font-weight: 900;
      font-size: 12px;
      letter-spacing: 1px;
      text-shadow: 0 1px 4px rgba(255,255,255,0.7);
      pointer-events: none;
    }

    .stickers {
      position: absolute;
      inset: 0;
      pointer-events: none;
      font-size: 24px;
    }

    .s1 { position: absolute; top: 56px; left: 16px; }
    .s2 { position: absolute; top: 56px; right: 16px; }
    .s3 { position: absolute; bottom: 14px; left: 16px; }
    .s4 { position: absolute; bottom: 14px; right: 16px; }

    .controls {
      margin-top: 16px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
    }

    button, select, a {
      font-size: 14px;
      border: none;
      border-radius: 999px;
      padding: 12px 16px;
    }

    button, a {
      background: #ff4da6;
      color: #fff;
      cursor: pointer;
      text-decoration: none;
    }

    select {
      background: #fff;
      border: 1px solid #ffc3df;
      color: #333;
    }

    #saveBtn {
      display: none;
    }

    #result {
      margin-top: 18px;
    }

    #result img {
      width: 100%;
      border-radius: 20px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.1);
      display: block;
    }

    .note {
      font-size: 12px;
      color: #777;
      margin-top: 10px;
    }

    canvas {
      display: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>平成プリクラ風カメラ</h1>
    <p>エフェクトを選んで撮影すると、プリクラ風の画像が保存できます。</p>

    <div class="camera-wrap">
      <video id="video"
