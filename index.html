<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>かんたんカメラ</title>
  <style>
    body {
      margin: 0;
      font-family: sans-serif;
      background: #f7f7f7;
      color: #222;
      text-align: center;
    }

    .container {
      max-width: 420px;
      margin: 0 auto;
      padding: 16px;
    }

    h1 {
      font-size: 24px;
      margin-bottom: 8px;
    }

    p {
      font-size: 14px;
      margin-bottom: 16px;
    }

    .camera-box {
      width: 100%;
      aspect-ratio: 3 / 4;
      background: #000;
      border-radius: 16px;
      overflow: hidden;
      margin-bottom: 16px;
      border: 10px solid #ff4da6;
      box-sizing: border-box;
    }

    video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transform: scaleX(-1);
    }

    canvas {
      display: none;
    }

    .buttons {
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
      position: relative;
      z-index: 10;
      margin-bottom: 10px;
    }

    .mode-box {
      margin-bottom: 12px;
    }

    select {
      font-size: 16px;
      padding: 10px 14px;
      border-radius: 12px;
      border: 2px solid #ff4da6;
      background: white;
      color: #222;
    }

    button, a {
      border: none;
      background: #ff4da6;
      color: white;
      padding: 14px 18px;
      border-radius: 999px;
      font-size: 16px;
      text-decoration: none;
      cursor: pointer;
      min-width: 120px;
      -webkit-appearance: none;
      appearance: none;
      touch-action: manipulation;
    }

    #saveBtn {
      display: none;
    }

    #result {
      margin-top: 20px;
    }

    #result img {
      width: 100%;
      border-radius: 16px;
      display: block;
      border: 10px solid #ff4da6;
      box-sizing: border-box;
    }

    .note {
      font-size: 12px;
      color: #666;
      margin-top: 10px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>かんたんカメラ</h1>
    <p>写真にピンクの枠と文字を入れて保存します。</p>

    <div class="camera-box">
      <video id="video" autoplay playsinline muted></video>
    </div>

    <div class="mode-box">
      <select id="modeSelect">
        <option value="normal">ノーマル</option>
        <option value="pink">ピンクモード</option>
      </select>
    </div>

    <div class="buttons">
      <button id="startBtn" type="button">カメラ開始</button>
      <button id="shotBtn" type="button">撮影</button>
      <a id="saveBtn" href="#" download="heisei-purikura.png">保存</a>
    </div>

    <canvas id="canvas"></canvas>

    <div id="result"></div>
    <div class="note">※ モードは撮影時に保存画像へ反映されます。</div>
  </div>

  <script>
    const video = document.getElementById("video");
    const canvas = document.getElementById("canvas");
    const startBtn = document.getElementById("startBtn");
    const shotBtn = document.getElementById("shotBtn");
    const saveBtn = document.getElementById("saveBtn");
    const result = document.getElementById("result");
    const modeSelect = document.getElementById("modeSelect");

    let stream = null;

    async function waitForVideoReady() {
      if (video.readyState >= 2 && video.videoWidth > 0) return;

      await new Promise((resolve) => {
        const check = () => {
          if (video.videoWidth > 0 && video.videoHeight > 0) {
            video.removeEventListener("loadedmetadata", check);
            video.removeEventListener("canplay", check);
            resolve();
          }
        };
        video.addEventListener("loadedmetadata", check);
        video.addEventListener("canplay", check);
      });
    }

    startBtn.addEventListener("click", async function () {
      try {
        stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: "user" },
          audio: false
        });

        video.srcObject = stream;
        await video.play();
        await waitForVideoReady();

        alert("カメラを開始しました");
      } catch (error) {
        alert("カメラを起動できませんでした");
      }
    });

    shotBtn.addEventListener("click", async function () {
      try {
        if (!stream) {
          alert("先にカメラ開始を押してください");
          return;
        }

        await waitForVideoReady();

        const width = video.videoWidth;
        const height = video.videoHeight;

        if (!width || !height) {
          alert("映像の準備がまだできていません");
          return;
        }

        canvas.width = width;
        canvas.height = height;

        const ctx = canvas.getContext("2d");
        ctx.clearRect(0, 0, width, height);

        const mode = modeSelect.value;

        ctx.save();
        ctx.translate(width, 0);
        ctx.scale(-1, 1);

        if (mode === "pink") {
          ctx.filter = "brightness(1.05) saturate(1.15) hue-rotate(-8deg)";
        } else {
          ctx.filter = "none";
        }

        ctx.drawImage(video, 0, 0, width, height);
        ctx.restore();

        ctx.filter = "none";

        ctx.strokeStyle = "#ff4da6";
        ctx.lineWidth = Math.max(12, width * 0.02);
        ctx.strokeRect(0, 0, width, height);

        ctx.fillStyle = "#ff4da6";
        ctx.font = "bold " + Math.max(24, width * 0.055) + "px sans-serif";
        ctx.textAlign = "center";
        ctx.textBaseline = "top";
        ctx.fillText("HEISEI PURIKURA", width / 2, Math.max(12, height * 0.03));

        const imageData = canvas.toDataURL("image/png");
        result.innerHTML = '<img src="' + imageData + '" alt="撮影した写真">';
        saveBtn.href = imageData;
        saveBtn.style.display = "inline-block";
      } catch (error) {
        alert("撮影に失敗しました");
      }
    });
  </script>
</body>
</html>
