<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>かんたんカメラ</title>
  <style>
    body {
      margin: 0;
      font-family: sans-serif;
      background: #f7f7f7;
      color: #222;
      text-align: center;
    }

    .container {
      max-width: 420px;
      margin: 0 auto;
      padding: 16px;
    }

    h1 {
      font-size: 24px;
      margin-bottom: 8px;
    }

    p {
      font-size: 14px;
      margin-bottom: 16px;
    }

    .camera-box {
      width: 100%;
      aspect-ratio: 3 / 4;
      background: #000;
      border-radius: 16px;
      overflow: hidden;
    }

    video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transform: scaleX(-1);
    }

    canvas {
      display: none;
    }

    .buttons {
      margin-top: 16px;
      display: flex;
      gap: 8px;
      justify-content: center;
      flex-wrap: wrap;
    }

    button, a {
      border: none;
      background: #ff4da6;
      color: white;
      padding: 12px 16px;
      border-radius: 999px;
      font-size: 14px;
      text-decoration: none;
      cursor: pointer;
    }

    #saveBtn {
      display: none;
    }

    #result {
      margin-top: 20px;
    }

    #result img {
      width: 100%;
      border-radius: 16px;
      display: block;
    }

    .note {
      font-size: 12px;
      color: #666;
      margin-top: 10px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>かんたんカメラ</h1>
    <p>まずは写真を撮って保存できるところまで作ります。</p>

    <div class="camera-box">
      <video id="video" autoplay playsinline muted></video>
    </div>

    <canvas id="canvas"></canvas>

    <div class="buttons">
      <button id="startBtn">カメラ開始</button>
      <button id="shotBtn">撮影</button>
      <a id="saveBtn" href="#" download="photo.png">保存</a>
    </div>

    <div id="result"></div>
    <div class="note">※ 先に「カメラ開始」を押してから撮影してください。</div>
  </div>
