<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>プリクラ風カメラ</title>
  <style>
    body {
      margin: 0;
      font-family: sans-serif;
      background: #ffeef6;
      color: #333;
      text-align: center;
    }
    .container {
      max-width: 420px;
      margin: 0 auto;
      padding: 16px;
    }
    h1 {
      font-size: 24px;
      margin-bottom: 8px;
    }
    p {
      font-size: 14px;
      margin-bottom: 16px;
    }
    .camera-wrap {
      position: relative;
      width: 100%;
      aspect-ratio: 3 / 4;
      background: #000;
      overflow: hidden;
      border-radius: 16px;
    }
    video, canvas {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .frame {
      position: absolute;
      inset: 0;
      pointer-events: none;
      border: 16px solid #ff6fb5;
      box-sizing: border-box;
      border-radius: 16px;
    }
    .frame::before {
      content: "HEISEI PURIKURA";
      position: absolute;
      top: 8px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(255,255,255,0.8);
      padding: 4px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: bold;
      color: #ff4fa3;
    }
    .buttons {
      display: flex;
      gap: 8px;
      justify-content: center;
      flex-wrap: wrap;
      margin-top: 16px;
    }
    button, a {
      border: none;
      background: #ff4fa3;
      color: white;
      padding: 12px 16px;
      border-radius: 999px;
      font-size: 14px;
      text-decoration: none;
      cursor: pointer;
    }
    #canvas {
      display: none;
    }
    #result {
      margin-top: 16px;
    }
    #result img {
      width: 100%;
      border-radius: 16px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>プリクラ風カメラ</h1>
    <p>カメラを起動して、撮影して、保存できます。</p>

    <div class="camera-wrap">
      <video id="video" autoplay playsinline></video>
      <div class="frame"></div>
    </div>

    anvas id="canvas"></canvas>

    <div class="buttons">
      <button id="startBtn">カメラ開始</button>
      <button id="shotBtn">撮影</button>
      <a id="downloadBtn" href="#" download="purikura.png" style="display:none;">保存</a>
    </div>

    <div id="result"></div>
  </div>

  <script>
    const video = document.getElementById("video");
    const canvas = document.getElementById("canvas");
    const startBtn = document.getElementById("startBtn");
    const shotBtn = document.getElementById("shotBtn");
    const downloadBtn = document.getElementById("downloadBtn");
    const result = document.getElementById("result");

    let stream;

    startBtn.addEventListener("click", async () => {
      try {
        stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: "user" },
          audio: false
        });
        video.srcObject = stream;
      } catch (error) {
        alert("カメラを起動できませんでした。スマホやブラウザの権限を確認してください。");
      }
    });

    shotBtn.addEventListener("click", () => {
      if (!video.videoWidth) {
        alert("先にカメラを開始してください。");
        return;
      }

      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;

      const ctx = canvas.getContext("2d");

      ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

      ctx.strokeStyle = "#ff6fb5";
      ctx.lineWidth = 40;
      ctx.strokeRect(0, 0, canvas.width, canvas.height);

      ctx.fillStyle = "rgba(255,255,255,0.8)";
      ctx.beginPath();
      ctx.roundRect(canvas.width / 2 - 180, 20, 360, 60, 30);
      ctx.fill();

      ctx.fillStyle = "#ff4fa3";
      ctx.font = "bold 28px sans-serif";
      ctx.textAlign = "center";
      ctx.fillText("HEISEI PURIKURA", canvas.width / 2, 60);

      const imageData = canvas.toDataURL("image/png");
      result.innerHTML = `<img src="${imageData}" alt="撮影結果">`;
      downloadBtn.href = imageData;
      downloadBtn.style.display = "inline-block";
    });
  </script>
</body>
</html>
